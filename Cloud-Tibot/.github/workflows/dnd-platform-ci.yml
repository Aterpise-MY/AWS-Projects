name: 🎲 DND Platform CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Prevent concurrent runs
concurrency:
  group: dnd-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  AWS_REGION: 'us-east-1'

jobs:
  # ============================================================================
  # JOB 1: Frontend Checks
  # ============================================================================
  frontend-validation:
    name: 🎨 Frontend Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📚 Install Dependencies
        run: |
          echo "Installing frontend dependencies..."
          npm ci
      
      - name: 🔍 TypeScript Check
        run: npm run type-check || npx tsc --noEmit
      
      - name: 🎨 Lint Check
        run: npm run lint || echo "⚠️ Linting skipped (no lint script)"
      
      - name: 🏗️ Build Frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build
      
      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ============================================================================
  # JOB 2: Lambda Functions Validation
  # ============================================================================
  lambda-validation:
    name: ⚡ Lambda Functions Check
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        lambda:
          - auth_handler
          - upload_signer
          - pdf_processor
          - get_characters
          - save_character
          - delete_character
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install Lambda Dependencies
        working-directory: infrastructure/lambda_src/${{ matrix.lambda }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            echo "✅ Dependencies installed for ${{ matrix.lambda }}"
          else
            echo "⚠️ No requirements.txt found for ${{ matrix.lambda }}"
          fi
      
      - name: 🔍 Python Syntax Check
        working-directory: infrastructure/lambda_src/${{ matrix.lambda }}
        run: |
          python -m py_compile *.py
          echo "✅ Syntax check passed for ${{ matrix.lambda }}"
      
      - name: 🧪 Run Unit Tests (if available)
        working-directory: infrastructure/lambda_src/${{ matrix.lambda }}
        run: |
          if [ -f test_*.py ]; then
            python -m pytest test_*.py -v
          else
            echo "⚠️ No tests found for ${{ matrix.lambda }}"
          fi
        continue-on-error: true

  # ============================================================================
  # JOB 3: Infrastructure Validation
  # ============================================================================
  terraform-validation:
    name: 🏗️ Terraform Infrastructure Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.0'
      
      - name: 🎨 Terraform Format Check
        working-directory: infrastructure
        run: terraform fmt -check -recursive
        continue-on-error: true
      
      - name: ✅ Terraform Init
        working-directory: infrastructure
        run: terraform init -backend=false
      
      - name: 🔍 Terraform Validate
        working-directory: infrastructure
        run: terraform validate
      
      - name: 📋 Terraform Plan (Dry Run)
        working-directory: infrastructure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_supabase_jwt_secret: ${{ secrets.SUPABASE_JWT_SECRET }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "📋 Running Terraform plan for PR..."
            terraform plan -no-color -input=false || echo "⚠️ Plan failed (expected for PR)"
          else
            echo "⏭️ Skipping plan for push event"
          fi
        continue-on-error: true

  # ============================================================================
  # JOB 4: Security Scanning
  # ============================================================================
  security-scan:
    name: 🔒 Security & Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔍 Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: 📊 NPM Audit
        run: npm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found"
        continue-on-error: true
      
      - name: 🐍 Python Safety Check
        run: |
          pip install safety
          find infrastructure/lambda_src -name requirements.txt -exec safety check -r {} \; || echo "⚠️ Python vulnerabilities found"
        continue-on-error: true

  # ============================================================================
  # JOB 5: Supabase Edge Functions Check
  # ============================================================================
  supabase-validation:
    name: 🔷 Supabase Edge Functions
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔷 Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      
      - name: 🔍 Check Edge Function
        working-directory: supabase/functions/process-action
        run: |
          deno check index.ts
          echo "✅ Edge function syntax check passed"

  # ============================================================================
  # JOB 6: Integration Tests
  # ============================================================================
  integration-tests:
    name: 🧪 Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend-validation, lambda-validation]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install Test Dependencies
        run: |
          pip install pytest requests boto3 moto
      
      - name: 🧪 Run Integration Tests
        working-directory: infrastructure
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -f test-*.py ] || [ -d tests/ ]; then
            python -m pytest tests/ -v || echo "⚠️ Some tests failed"
          else
            echo "⚠️ No integration tests found"
          fi
        continue-on-error: true

  # ============================================================================
  # JOB 7: Notification
  # ============================================================================
  notify-telegram:
    name: 📢 Telegram Notification
    runs-on: ubuntu-latest
    needs: [frontend-validation, lambda-validation, terraform-validation, security-scan]
    if: always()
    
    steps:
      - name: 📤 Send Telegram Notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_GIT_RADAR: ${{ secrets.TELEGRAM_TOPIC_GIT_RADAR }}
        run: |
          STATUS="${{ needs.frontend-validation.result == 'success' && needs.lambda-validation.result == 'success' && needs.terraform-validation.result == 'success' && '✅ PASSED' || '❌ FAILED' }}"
          
          MESSAGE="🎲 *DND Platform CI/CD*%0A%0A"
          MESSAGE+="Repository: \`${{ github.repository }}\`%0A"
          MESSAGE+="Branch: \`${{ github.ref_name }}\`%0A"
          MESSAGE+="Commit: \`${{ github.sha }}\` by @${{ github.actor }}%0A%0A"
          MESSAGE+="*Results:*%0A"
          MESSAGE+="🎨 Frontend: ${{ needs.frontend-validation.result }}%0A"
          MESSAGE+="⚡ Lambda: ${{ needs.lambda-validation.result }}%0A"
          MESSAGE+="🏗️ Infrastructure: ${{ needs.terraform-validation.result }}%0A"
          MESSAGE+="🔒 Security: ${{ needs.security-scan.result }}%0A%0A"
          MESSAGE+="Overall Status: ${STATUS}"
          
          # Build curl command with optional topic routing
          CURL_ARGS="-d chat_id=${TELEGRAM_CHAT_ID} -d text=${MESSAGE} -d parse_mode=Markdown"
          if [ -n "${TELEGRAM_TOPIC_GIT_RADAR}" ]; then
            CURL_ARGS="${CURL_ARGS} -d message_thread_id=${TELEGRAM_TOPIC_GIT_RADAR}"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" ${CURL_ARGS}
