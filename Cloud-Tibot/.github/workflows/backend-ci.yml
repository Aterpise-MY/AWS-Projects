name: Backend CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]
  repository_dispatch:
    types: [backend-ci]
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───── Smart Change Detection ─────
  detect:
    name: Detect Backend Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.override.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # CRITICAL: Fetch full history for accurate diff detection on merges

      - name: Detect backend changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'infrastructure/lambda_src/**'
              - 'infrastructure/tests/**'
              - 'infrastructure/terraform/**'
              - 'api/**'
              - 'supabase/functions/**'
              - 'src/module*/**'
              - '*.py'
              - 'requirements*.txt'
              - 'Makefile'
              - '.github/workflows/backend-ci.yml'

      - name: Override for manual triggers
        id: override
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Manual/webhook trigger — forcing backend CI run"
          else
            echo "should_run=${{ steps.changes.outputs.backend }}" >> $GITHUB_OUTPUT
          fi

      - name: Debug changed files
        if: steps.changes.outputs.backend == 'true'
        run: |
          echo "## 🔍 Backend Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changes.outputs.backend_files }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "## 🔍 Backend Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "**Should run:** \`${{ steps.override.outputs.should_run }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Changes detected:** \`${{ steps.changes.outputs.backend }}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.backend }}" == "false" ]]; then
            echo "> ⏭️ No backend files changed — all jobs skipped" >> $GITHUB_STEP_SUMMARY
          fi

  # ───── Python Lambda Tests ─────
  lambda-tests:
    name: Lambda Unit Tests (Python)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_run == 'true'
    strategy:
      matrix:
        python-version: ['3.9', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov boto3 pydantic
          for req in infrastructure/lambda_src/*/requirements.txt; do
            if [ -f "$req" ]; then
              echo "📦 Installing: $req"
              pip install -r "$req"
            fi
          done
      - name: Run Python tests
        run: |
          pytest infrastructure/tests/ -v --tb=short --junitxml=reports/backend-test-results.xml || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -eq 5 ]; then
            echo "⚠️ No tests collected — treating as success"
            exit 0
          elif [ "${EXIT_CODE:-0}" -ne 0 ]; then
            exit $EXIT_CODE
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DYNAMO_TABLE_NAME: test-characters
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-py${{ matrix.python-version }}
          path: reports/
          retention-days: 7

  # ───── API Route Lint ─────
  api-lint:
    name: API Route Lint (TypeScript)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type-check (non-blocking)
        continue-on-error: true
        run: |
          npx tsc --noEmit 2>&1 || true
          echo "::warning::TypeScript lint completed — errors are non-blocking"

  # ───── Skip Notice ─────
  skipped:
    name: Backend CI Skipped
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_run == 'false'
    steps:
      - run: |
          echo "## ⏭️ Backend CI Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No backend files changed in this commit." >> $GITHUB_STEP_SUMMARY
