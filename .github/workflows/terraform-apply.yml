# =============================================================================
# terraform-apply.yml — Multi-Environment Deploy Pipeline
# =============================================================================
# Triggers:
#   push to main  → full pipeline: dev (auto) → staging (approval) → prod (approval)
#   workflow_dispatch → same pipeline, manually triggered
#
# Each environment follows the same pattern:
#   plan-{env}  → fresh terraform plan, uploads binary tfplan to S3 + artifact
#   apply-{env} → downloads exact tfplan, applies, runs health check
#
# Approval gates:
#   dev     → no approval needed (auto-deploys)
#   staging → requires reviewer via GitHub Environment protection rules
#   prod    → requires reviewer via GitHub Environment protection rules
#
# On health check failure:
#   - Pre-apply tfstate snapshot is restored to S3 for manual recovery
#   - A GitHub Issue is created with full failure context
#   - The job fails (does NOT attempt auto-apply rollback — too risky for prod)
#
# AWS auth: OIDC via AWS_ROLE_ARN secret (preferred).
#           Falls back to AWS_ACCESS_KEY_ID/SECRET if AWS_ROLE_ARN is empty.
# =============================================================================

name: "Terraform — Deploy"

on:
  push:
    branches: [main]
    paths:
      - "Multi-Tenant SaaS Application/terraform/**"
  workflow_dispatch:

# Only one deploy pipeline runs at a time per branch
concurrency:
  group: tf-deploy-${{ github.ref }}
  cancel-in-progress: false   # never interrupt an in-flight apply

env:
  TF_VERSION:   "1.6.0"
  AWS_REGION:   "us-east-1"
  TF_DIR:       "Multi-Tenant SaaS Application/terraform"
  STATE_BUCKET: "dnd-terraform-state-staging-022499047467"


# =============================================================================
# ── DEV — automatic, no approval gate ────────────────────────────────────────
# =============================================================================
jobs:

  plan-dev:
    name: "Plan (dev)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4

      - name: "build lambda packages"
        run: bash "Multi-Tenant SaaS Application/scripts/build_lambdas.sh"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "init"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="key=multitenant-saas/dev/terraform.tfstate"

      - name: "plan"
        id: plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.MULTITENANT_DB_PASSWORD }}
        run: |
          set +e
          terraform plan \
            -input=false -no-color \
            -out=tfplan \
            -var-file="envs/dev.tfvars" \
            -detailed-exitcode
          TF_EXIT=$?
          echo "exitcode=$TF_EXIT" >> $GITHUB_OUTPUT
          set -e
          [ "$TF_EXIT" = "1" ] && exit 1 || true

      - name: "render plan"
        working-directory: ${{ env.TF_DIR }}
        run: terraform show -no-color tfplan > plan.txt && cat plan.txt

      # Upload the exact binary tfplan — apply will download this to guarantee
      # the same change set is applied (no plan/apply drift)
      - uses: actions/upload-artifact@v4
        with:
          name: "tfplan-dev-${{ github.sha }}"
          path: "${{ env.TF_DIR }}/tfplan"
          retention-days: 5

      - name: "backup plan to S3"
        run: |
          aws s3 cp "${{ env.TF_DIR }}/tfplan" \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/dev/${{ github.sha }}.tfplan"


  apply-dev:
    name: "Apply (dev)"
    needs: plan-dev
    # Skip apply when plan has no changes (exitcode 0) or errored (exitcode 1)
    if: needs.plan-dev.outputs.exitcode == '2'
    runs-on: ubuntu-latest
    # 'dev' environment has no required reviewers — auto-deploys
    environment:
      name: dev
      url:  https://console.aws.amazon.com/

    permissions:
      contents: write   # needed to create GitHub Issues on failure
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: "build lambda packages"
        run: bash "Multi-Tenant SaaS Application/scripts/build_lambdas.sh"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "init"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="key=multitenant-saas/dev/terraform.tfstate"

      # Snapshot the current state BEFORE apply — used to restore on rollback
      - name: "snapshot pre-apply state"
        run: |
          aws s3 cp \
            "s3://${{ env.STATE_BUCKET }}/multitenant-saas/dev/terraform.tfstate" \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/dev/pre-apply-${{ github.sha }}.tfstate" \
          || echo "No existing state to snapshot (first deploy)"

      - uses: actions/download-artifact@v4
        with:
          name: "tfplan-dev-${{ github.sha }}"
          path: ${{ env.TF_DIR }}

      - name: "apply"
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.MULTITENANT_DB_PASSWORD }}
        run: terraform apply -auto-approve tfplan

      # Export Terraform outputs as env vars for the health check script
      - name: "export outputs"
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform output -no-color
          echo "user_pool_id=$(terraform output -raw user_pool_id 2>/dev/null || echo '')"    >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint 2>/dev/null || echo '')"    >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_gateway_invoke_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: "health check"
        id: health
        env:
          TF_OUT_USER_POOL_ID:    ${{ steps.outputs.outputs.user_pool_id }}
          TF_OUT_RDS_ENDPOINT:    ${{ steps.outputs.outputs.rds_endpoint }}
          TF_OUT_API_GATEWAY_URL: ${{ steps.outputs.outputs.api_url }}
          ENVIRONMENT:            dev
        run: |
          chmod +x "Multi-Tenant SaaS Application/scripts/health_check.sh"
          bash "Multi-Tenant SaaS Application/scripts/health_check.sh"

      # On health check failure: restore pre-apply state and open a GitHub Issue
      - name: "rollback — restore pre-apply state"
        if: failure() && steps.health.outcome == 'failure'
        run: |
          echo "Health check failed — restoring pre-apply state snapshot …"
          aws s3 cp \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/dev/pre-apply-${{ github.sha }}.tfstate" \
            "s3://${{ env.STATE_BUCKET }}/multitenant-saas/dev/terraform.tfstate" \
          && echo "State restored. Run 'terraform apply' locally to reconcile." \
          || echo "Warning: no pre-apply snapshot found."

      - name: "create failure issue"
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[dev] Terraform deploy failed — SHA ${context.sha.substring(0,7)}`,
              body: [
                '## Terraform Deploy Failure — `dev`',
                '',
                `| Field | Value |`,
                `|---|---|`,
                `| SHA | \`${{ github.sha }}\` |`,
                `| Actor | \`${{ github.actor }}\` |`,
                `| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
                '',
                '**Action required:**',
                '1. Review the failed job logs above.',
                '2. If infrastructure is in a partial state, the pre-apply state snapshot has been restored to S3.',
                '3. Run `terraform plan -var-file=envs/dev.tfvars` locally to inspect the diff.',
                '4. Apply or destroy manually as needed, then close this issue.',
              ].join('\n'),
              labels: ['terraform', 'incident'],
            });


# =============================================================================
# ── STAGING — requires approval via GitHub Environment "staging" ──────────────
# =============================================================================

  plan-staging:
    name: "Plan (staging)"
    needs: apply-dev   # only plan staging once dev is healthy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4

      - name: "build lambda packages"
        run: bash "Multi-Tenant SaaS Application/scripts/build_lambdas.sh"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "init"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="key=multitenant-saas/staging/terraform.tfstate"

      - name: "plan"
        id: plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.MULTITENANT_DB_PASSWORD }}
        run: |
          set +e
          terraform plan \
            -input=false -no-color \
            -out=tfplan \
            -var-file="envs/staging.tfvars" \
            -detailed-exitcode
          TF_EXIT=$?
          echo "exitcode=$TF_EXIT" >> $GITHUB_OUTPUT
          set -e
          [ "$TF_EXIT" = "1" ] && exit 1 || true

      - name: "render plan"
        working-directory: ${{ env.TF_DIR }}
        run: terraform show -no-color tfplan > plan.txt && cat plan.txt

      - uses: actions/upload-artifact@v4
        with:
          name: "tfplan-staging-${{ github.sha }}"
          path: "${{ env.TF_DIR }}/tfplan"
          retention-days: 5

      - name: "backup plan to S3"
        run: |
          aws s3 cp "${{ env.TF_DIR }}/tfplan" \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/staging/${{ github.sha }}.tfplan"


  apply-staging:
    name: "Apply (staging)"
    needs: plan-staging
    if: needs.plan-staging.outputs.exitcode == '2'
    runs-on: ubuntu-latest
    # 'staging' environment MUST have required reviewers configured on GitHub.
    # Go to: Settings → Environments → staging → Required reviewers
    environment:
      name: staging
      url:  https://console.aws.amazon.com/

    permissions:
      contents: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: "build lambda packages"
        run: bash "Multi-Tenant SaaS Application/scripts/build_lambdas.sh"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "init"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="key=multitenant-saas/staging/terraform.tfstate"

      - name: "snapshot pre-apply state"
        run: |
          aws s3 cp \
            "s3://${{ env.STATE_BUCKET }}/multitenant-saas/staging/terraform.tfstate" \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/staging/pre-apply-${{ github.sha }}.tfstate" \
          || echo "No existing state to snapshot (first deploy)"

      - uses: actions/download-artifact@v4
        with:
          name: "tfplan-staging-${{ github.sha }}"
          path: ${{ env.TF_DIR }}

      - name: "apply"
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.MULTITENANT_DB_PASSWORD }}
        run: terraform apply -auto-approve tfplan

      - name: "export outputs"
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform output -no-color
          echo "user_pool_id=$(terraform output -raw user_pool_id 2>/dev/null || echo '')"      >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint 2>/dev/null || echo '')"      >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_gateway_invoke_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: "health check"
        id: health
        env:
          TF_OUT_USER_POOL_ID:    ${{ steps.outputs.outputs.user_pool_id }}
          TF_OUT_RDS_ENDPOINT:    ${{ steps.outputs.outputs.rds_endpoint }}
          TF_OUT_API_GATEWAY_URL: ${{ steps.outputs.outputs.api_url }}
          ENVIRONMENT:            staging
        run: |
          chmod +x "Multi-Tenant SaaS Application/scripts/health_check.sh"
          bash "Multi-Tenant SaaS Application/scripts/health_check.sh"

      - name: "rollback — restore pre-apply state"
        if: failure() && steps.health.outcome == 'failure'
        run: |
          aws s3 cp \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/staging/pre-apply-${{ github.sha }}.tfstate" \
            "s3://${{ env.STATE_BUCKET }}/multitenant-saas/staging/terraform.tfstate" \
          && echo "State restored." || echo "Warning: no pre-apply snapshot found."

      - name: "create failure issue"
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[staging] Terraform deploy failed — SHA ${context.sha.substring(0,7)}`,
              body: [
                '## Terraform Deploy Failure — `staging`',
                `| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
                `| SHA | \`${{ github.sha }}\` |`,
                '**Pre-apply state snapshot has been restored. Review and reconcile manually.**',
              ].join('\n'),
              labels: ['terraform', 'incident'],
            });


# =============================================================================
# ── PROD — requires approval via GitHub Environment "prod" ───────────────────
# =============================================================================

  plan-prod:
    name: "Plan (prod)"
    needs: apply-staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4

      - name: "build lambda packages"
        run: bash "Multi-Tenant SaaS Application/scripts/build_lambdas.sh"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "init"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="key=multitenant-saas/prod/terraform.tfstate"

      - name: "plan"
        id: plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.MULTITENANT_DB_PASSWORD }}
        run: |
          set +e
          terraform plan \
            -input=false -no-color \
            -out=tfplan \
            -var-file="envs/prod.tfvars" \
            -detailed-exitcode
          TF_EXIT=$?
          echo "exitcode=$TF_EXIT" >> $GITHUB_OUTPUT
          set -e
          [ "$TF_EXIT" = "1" ] && exit 1 || true

      - name: "render plan"
        working-directory: ${{ env.TF_DIR }}
        run: terraform show -no-color tfplan > plan.txt && cat plan.txt

      - uses: actions/upload-artifact@v4
        with:
          name: "tfplan-prod-${{ github.sha }}"
          path: "${{ env.TF_DIR }}/tfplan"
          retention-days: 5

      - name: "backup plan to S3"
        run: |
          aws s3 cp "${{ env.TF_DIR }}/tfplan" \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/prod/${{ github.sha }}.tfplan"


  apply-prod:
    name: "Apply (prod)"
    needs: plan-prod
    if: needs.plan-prod.outputs.exitcode == '2'
    runs-on: ubuntu-latest
    # 'prod' environment MUST have required reviewers configured.
    # Go to: Settings → Environments → prod → Required reviewers
    environment:
      name: prod
      url:  https://console.aws.amazon.com/

    permissions:
      contents: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: "build lambda packages"
        run: bash "Multi-Tenant SaaS Application/scripts/build_lambdas.sh"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "init"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="key=multitenant-saas/prod/terraform.tfstate"

      - name: "snapshot pre-apply state"
        run: |
          aws s3 cp \
            "s3://${{ env.STATE_BUCKET }}/multitenant-saas/prod/terraform.tfstate" \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/prod/pre-apply-${{ github.sha }}.tfstate" \
          || echo "No existing state to snapshot (first deploy)"

      - uses: actions/download-artifact@v4
        with:
          name: "tfplan-prod-${{ github.sha }}"
          path: ${{ env.TF_DIR }}

      - name: "apply"
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.MULTITENANT_DB_PASSWORD }}
        run: terraform apply -auto-approve tfplan

      - name: "export outputs"
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform output -no-color
          echo "user_pool_id=$(terraform output -raw user_pool_id 2>/dev/null || echo '')"      >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint 2>/dev/null || echo '')"      >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_gateway_invoke_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: "health check"
        id: health
        env:
          TF_OUT_USER_POOL_ID:    ${{ steps.outputs.outputs.user_pool_id }}
          TF_OUT_RDS_ENDPOINT:    ${{ steps.outputs.outputs.rds_endpoint }}
          TF_OUT_API_GATEWAY_URL: ${{ steps.outputs.outputs.api_url }}
          ENVIRONMENT:            prod
        run: |
          chmod +x "Multi-Tenant SaaS Application/scripts/health_check.sh"
          bash "Multi-Tenant SaaS Application/scripts/health_check.sh"

      - name: "rollback — restore pre-apply state"
        if: failure() && steps.health.outcome == 'failure'
        run: |
          aws s3 cp \
            "s3://${{ env.STATE_BUCKET }}/plans/multitenant/prod/pre-apply-${{ github.sha }}.tfstate" \
            "s3://${{ env.STATE_BUCKET }}/multitenant-saas/prod/terraform.tfstate" \
          && echo "State restored." || echo "Warning: no pre-apply snapshot found."

      - name: "create failure issue"
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[PROD] Terraform deploy failed — SHA ${context.sha.substring(0,7)}`,
              body: [
                '## 🚨 Terraform Deploy Failure — `prod`',
                `| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
                `| SHA | \`${{ github.sha }}\` |`,
                `| Actor | \`${{ github.actor }}\` |`,
                '',
                '**PRODUCTION INCIDENT — Pre-apply state snapshot restored. Immediate investigation required.**',
              ].join('\n'),
              labels: ['terraform', 'incident', 'production'],
            });
