# =============================================================================
# deploy-projects.yml — Smart Multi-Project Terraform Deploy
# =============================================================================
# Triggers:
#   push to main → detects which of the four independent projects changed,
#                  then deploys only those projects in parallel.
#
# Why two jobs?
#   detect-changes  → runs dorny/paths-filter to determine what changed, then
#                     emits a JSON array used as the matrix for the deploy job.
#   deploy          → one matrix runner per changed project; completely
#                     independent (fail-fast: false) so a failure in project A
#                     does not block project B.
#
# AWS auth:
#   OIDC only via aws-actions/configure-aws-credentials@v4.
#   No long-lived access keys are stored in GitHub.
#   Required secret: AWS_ROLE_ARN
#   (See .github/scripts/setup-oidc.sh for the IAM role bootstrap)
#
# State isolation:
#   All four projects share one S3 bucket (TF_STATE_BUCKET) and one DynamoDB
#   lock table (TF_LOCK_TABLE), but each project uses a unique state key.
#   This is a "partial backend configuration" pattern — the key, bucket, region,
#   and dynamodb_table are all injected at `terraform init` time via
#   -backend-config flags, so no secrets are hardcoded in backend.tf files.
#
# Example backend.tf per project (replace <slug> with the value in the matrix):
#
#   terraform {
#     backend "s3" {
#       # bucket, key, region, dynamodb_table are injected at init time.
#       # Only encrypt can be hardcoded safely.
#       encrypt = true
#     }
#   }
#
# State key mapping:
#   Cloud-Tibot                              → cloud-tibot/terraform.tfstate
#   Multi-Tier Web App Deployment            → multi-tier-web-app/terraform.tfstate
#   Scalable Web App with ALB & Auto Scaling → scalable-web-app-alb/terraform.tfstate
#   Scalable Web App with NLB & Auto Scaling → scalable-web-app-nlb/terraform.tfstate
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN      — IAM role ARN to assume via OIDC
#   TF_STATE_BUCKET   — S3 bucket name for remote state
#   TF_LOCK_TABLE     — DynamoDB table name for state locking
#
# Adding manual approval (GitHub Environments):
#   Uncomment the `environment:` block in the deploy job, create an Environment
#   called "production" in Settings → Environments, and add Required Reviewers.
#   The apply step will pause until a reviewer approves in the Actions UI.
#
# Adding health checks / rollback:
#   After the "apply" step, add steps that curl a health endpoint or run
#   aws CLI checks. On failure, restore the pre-apply state snapshot from S3.
#   See terraform-apply.yml in this repo for the full rollback pattern.
# =============================================================================

name: "Deploy Changed Projects"

on:
  push:
    branches: [main]

# Only one deploy pipeline runs at a time; never interrupt an in-flight apply.
concurrency:
  group: tf-multi-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.6.0"
  AWS_REGION: "us-east-1"


# =============================================================================
# ── Job 1: Detect which projects have changed files ───────────────────────────
# =============================================================================
jobs:

  detect-changes:
    name: "Detect Changed Projects"
    runs-on: ubuntu-latest
    outputs:
      # JSON array of project objects; consumed by the deploy job matrix.
      matrix:      ${{ steps.build-matrix.outputs.matrix }}
      # Boolean string ("true"/"false") — gates the deploy job entirely.
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      # dorny/paths-filter emits one boolean output per named filter.
      # Each filter matches ANY file under the project's root directory so that
      # changes to .tf files, scripts, or README all trigger a redeploy.
      - name: "Filter changed paths"
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cloud-tibot:
              - 'Cloud-Tibot/**'
            multi-tier:
              - 'Multi-Tier Web App Deployment/**'
            alb:
              - 'Scalable Web App with ALB & Auto Scaling/**'
            nlb:
              - 'Scalable Web App with NLB & Auto Scaling/**'

      # Translate the per-project boolean outputs into a JSON array.
      # Each object carries the three values the deploy job needs:
      #   name       — human-readable label (used in job display name)
      #   dir        — working-directory for all Terraform commands
      #   state_key  — unique S3 state key for this project
      - name: "Build deploy matrix"
        id: build-matrix
        run: |
          MATRIX='[]'

          # Helper: append a JSON object to the matrix array
          add_project() {
            MATRIX=$(echo "$MATRIX" | jq --argjson obj "$1" '. + [$obj]')
          }

          # Add each project whose paths-filter output is "true"
          [[ "${{ steps.filter.outputs.cloud-tibot }}" == "true" ]] && \
            add_project '{
              "name":      "Cloud-Tibot",
              "dir":       "Cloud-Tibot/infrastructure/terraform",
              "state_key": "cloud-tibot/terraform.tfstate"
            }'

          [[ "${{ steps.filter.outputs.multi-tier }}" == "true" ]] && \
            add_project '{
              "name":      "Multi-Tier Web App Deployment",
              "dir":       "Multi-Tier Web App Deployment",
              "state_key": "multi-tier-web-app/terraform.tfstate"
            }'

          [[ "${{ steps.filter.outputs.alb }}" == "true" ]] && \
            add_project '{
              "name":      "Scalable Web App with ALB",
              "dir":       "Scalable Web App with ALB & Auto Scaling",
              "state_key": "scalable-web-app-alb/terraform.tfstate"
            }'

          [[ "${{ steps.filter.outputs.nlb }}" == "true" ]] && \
            add_project '{
              "name":      "Scalable Web App with NLB",
              "dir":       "Scalable Web App with NLB & Auto Scaling",
              "state_key": "scalable-web-app-nlb/terraform.tfstate"
            }'

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          # Emit has_changes so the deploy job can be skipped entirely when
          # no Terraform project directories were touched.
          if [[ "$MATRIX" == "[]" ]]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed projects: $MATRIX"
          fi


# =============================================================================
# ── Job 2: Deploy each changed project (parallel matrix) ─────────────────────
# =============================================================================

  deploy:
    name: "Deploy: ${{ matrix.project.name }}"
    needs: detect-changes

    # Skip the entire job when detect-changes found nothing to deploy.
    if: needs.detect-changes.outputs.has_changes == 'true'

    runs-on: ubuntu-latest

    # fail-fast: false ensures a failure in one project does not cancel the
    # runners for other projects. Each project deploys independently.
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    # Uncomment to add a manual approval gate before terraform apply.
    # Create a GitHub Environment named "production" in Settings → Environments,
    # then add Required Reviewers. The job will pause at the environment gate
    # until a reviewer approves in the GitHub Actions UI.
    #
    # environment:
    #   name: production
    #   url:  https://console.aws.amazon.com/

    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange

    steps:
      - uses: actions/checkout@v4

      # ── AWS Auth (OIDC) ──────────────────────────────────────────────────────
      # Assumes the IAM role via OIDC — no static credentials stored in GitHub.
      # The role's trust policy must allow the repo's OIDC subject claim.
      # See .github/scripts/setup-oidc.sh for the IAM role bootstrap.
      - name: "Configure AWS credentials (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # ── Terraform CLI ────────────────────────────────────────────────────────
      - name: "Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # wrapper: false keeps exit codes clean (needed for -detailed-exitcode)
          terraform_wrapper: false

      # ── Lint: tflint ─────────────────────────────────────────────────────────
      # tflint catches issues that terraform validate cannot (deprecated
      # arguments, provider-specific rule violations, naming conventions).
      - name: "Setup tflint"
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: "tflint — init plugins"
        working-directory: ${{ matrix.project.dir }}
        # Allow init to fail gracefully if no .tflint.hcl is present; the
        # lint run itself is still useful with built-in rules only.
        run: tflint --init || true

      - name: "tflint — run"
        working-directory: ${{ matrix.project.dir }}
        run: tflint --no-color

      # ── Lint: fmt check ───────────────────────────────────────────────────────
      # Fails fast if any .tf file is not canonically formatted.
      # Run locally with: terraform fmt -recursive <project-dir>
      - name: "terraform fmt check"
        working-directory: ${{ matrix.project.dir }}
        run: terraform fmt -check -recursive -no-color

      # ── Init ─────────────────────────────────────────────────────────────────
      # Partial backend configuration: the bucket, region, and DynamoDB table
      # come from secrets; only the state key is project-specific and is set
      # dynamically from the matrix. This pattern avoids duplicating backend
      # config across four separate backend.tf files.
      - name: "terraform init"
        working-directory: ${{ matrix.project.dir }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.project.state_key }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # ── Validate ──────────────────────────────────────────────────────────────
      # Checks configuration correctness without contacting the provider APIs.
      - name: "terraform validate"
        working-directory: ${{ matrix.project.dir }}
        run: terraform validate -no-color

      # ── Plan ─────────────────────────────────────────────────────────────────
      # -detailed-exitcode exit codes:
      #   0 = no changes (apply step will be skipped)
      #   1 = error (job fails here)
      #   2 = changes present (apply step will run)
      - name: "terraform plan"
        id: plan
        working-directory: ${{ matrix.project.dir }}
        run: |
          set +e
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            -detailed-exitcode
          TF_EXIT=$?
          echo "exitcode=$TF_EXIT" >> $GITHUB_OUTPUT
          set -e
          # Exit 1 = real error; propagate it. Exit 0/2 continue normally.
          [ "$TF_EXIT" = "1" ] && exit 1 || true

      - name: "Render plan (human-readable)"
        working-directory: ${{ matrix.project.dir }}
        run: terraform show -no-color tfplan

      # ── Apply ─────────────────────────────────────────────────────────────────
      # Skipped automatically when plan exit code is 0 (no infrastructure changes).
      #
      # To add a health-check and rollback after this step:
      #   1. Snapshot pre-apply state:
      #        aws s3 cp s3://<bucket>/<key> s3://<bucket>/backups/<sha>.tfstate
      #   2. Add a step that curls a health endpoint or runs aws CLI checks.
      #   3. On failure, restore the snapshot:
      #        aws s3 cp s3://<bucket>/backups/<sha>.tfstate s3://<bucket>/<key>
      #   See terraform-apply.yml in this repo for the complete rollback pattern.
      - name: "terraform apply"
        if: steps.plan.outputs.exitcode == '2'
        working-directory: ${{ matrix.project.dir }}
        run: terraform apply -auto-approve tfplan

      # Print outputs so they appear in the job log for debugging / auditing.
      - name: "Show Terraform outputs"
        if: steps.plan.outputs.exitcode == '2'
        working-directory: ${{ matrix.project.dir }}
        run: terraform output -no-color
